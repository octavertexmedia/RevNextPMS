{% extends 'tenants/base_dashboard.html' %}
{% block title %}Adjust stock — {{ item.name }}{% endblock %}
{% block page_title %}Adjust · {{ item.name }}{% endblock %}

{% block content %}
<form method="post" class="bg-white rounded-xl border p-6 max-w-lg space-y-4">
  {% csrf_token %}
  <p class="text-sm text-gray-500">Current stock: <strong>{{ item.stock_qty }}</strong></p>
  <div>
    <label class="block text-sm font-medium mb-1">Delta (+ receive / − waste)</label>
    <input type="number" step="0.01" name="delta" required class="w-full rounded-lg border-gray-300">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Reason</label>
    <select name="reason" class="w-full rounded-lg border-gray-300">
      <option value="RECEIVE">Stock received</option>
      <option value="ADJUST">Manual adjustment</option>
      <option value="WASTE">Wastage</option>
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Note</label>
    <input type="text" name="note" class="w-full rounded-lg border-gray-300">
  </div>
  <button class="px-4 py-2 rounded-lg bg-indigo-600 text-white font-semibold">Save</button>
</form>
{% endblock %}
