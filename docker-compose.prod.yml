# Channel Manager (RevNext) — production Docker Compose
# Contabo VPS co-host safe:
#   SuratBazaar :8000 | ChannelManager :8001 | HappyNails :8002 | Packmold :8003
# Postgres / Redis stay on the internal Docker network (no host 5432/6379 clash).
#
# OpenBao lives in a SEPARATE stack: ~/revnext-secrets (secrets.revnext.in).
# ChannelManager CI must never start/stop that stack. Point OPENBAO_ADDR at
# http://172.17.0.1:8200 (Docker bridge → host) or https://secrets.revnext.in.

services:
  db:
    image: postgres:15-alpine
    container_name: channel_manager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-channel_manager}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env next to docker-compose.yml (or load via OpenBao)}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - channel-manager-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-channel_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: channel_manager_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - channel-manager-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: channel-manager:latest
    container_name: channel_manager_web
    restart: unless-stopped
    command: gunicorn --bind 0.0.0.0:8001 --workers 4 --timeout 120 --access-logfile - --error-logfile - channel_manager.wsgi:application
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      # Host-published OpenBao from ~/revnext-secrets (override in .env)
      - OPENBAO_ADDR=${OPENBAO_ADDR:-http://172.17.0.1:8200}
      - SEED_ON_START=true
      - COLLECTSTATIC_ON_START=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - channel-manager-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -o /dev/null -H 'Host: channel-manager.revnext.in' http://127.0.0.1:8001/health/",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery:
    image: channel-manager:latest
    container_name: channel_manager_celery
    restart: unless-stopped
    command: celery -A channel_manager worker -l info --concurrency=4
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - OPENBAO_ADDR=${OPENBAO_ADDR:-http://172.17.0.1:8200}
      - SKIP_MIGRATE=true
      - SEED_ON_START=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
      - web
    networks:
      - channel-manager-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery-beat:
    image: channel-manager:latest
    container_name: channel_manager_celery_beat
    restart: unless-stopped
    command: celery -A channel_manager beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - OPENBAO_ADDR=${OPENBAO_ADDR:-http://172.17.0.1:8200}
      - SKIP_MIGRATE=true
      - SEED_ON_START=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
      - web
    networks:
      - channel-manager-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  channel-manager-network:
    driver: bridge
