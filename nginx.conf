# Nginx HTTPS config (alias of nginx-config.https.conf for older docs/scripts).
# Prefer nginx-config.https.conf / nginx-config.conf — deploy.sh picks the right one.
# Contabo: 127.0.0.1:8001 behind host nginx site "channel-manager".

upstream channel_manager {
    server 127.0.0.1:8001;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    # Contabo product hosts only (not Vercel apex/www, not CMS VPS)
    server_name
        channel-manager.revnext.in
        booking.revnext.in
        networks.revnext.in
        pms.revnext.in
        pos.revnext.in
        hotels.revnext.in
        tours.revnext.in;

    ssl_certificate /etc/letsencrypt/live/channel-manager.revnext.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/channel-manager.revnext.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /static/ {
        alias /home/deploy/channel-manager/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/deploy/channel-manager/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /health/ {
        proxy_pass http://channel_manager;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /booking/widget/ {
        proxy_pass http://channel_manager;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Frame-Options;
    }

    location / {
        proxy_pass http://channel_manager;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/channel-manager-access.log;
    error_log /var/log/nginx/channel-manager-error.log;
}

server {
    listen 80;
    # Contabo product hosts only (not Vercel apex/www, not CMS VPS)
    server_name
        channel-manager.revnext.in
        booking.revnext.in
        networks.revnext.in
        pms.revnext.in
        pos.revnext.in
        hotels.revnext.in
        tours.revnext.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
