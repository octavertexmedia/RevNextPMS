# HTTP-only bootstrap for secrets.revnext.in (before certbot).
# After TLS: use nginx-secrets.conf and set SECRETS_NGINX_TLS=1.

upstream revnext_openbao {
    server 127.0.0.1:8200;
    keepalive 8;
}

server {
    listen 80;
    server_name secrets.revnext.in;

    client_max_body_size 16M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://revnext_openbao;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    access_log /var/log/nginx/secrets-access.log;
    error_log /var/log/nginx/secrets-error.log;
}
