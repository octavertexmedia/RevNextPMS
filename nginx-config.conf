# Nginx HTTP-only for Channel Manager (RevNext)
# Used until Let's Encrypt certs exist. After certbot, redeploy with HTTPS template.
# Upstream: 127.0.0.1:8001
# Site name: /etc/nginx/sites-available/channel-manager

upstream channel_manager {
    server 127.0.0.1:8001;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name
        channel-manager.revnext.in
        booking.revnext.in
        networks.revnext.in
        pms.revnext.in
        pos.revnext.in
        cms.revnext.in
        hotels.revnext.in
        tours.revnext.in
        revnext.in
        www.revnext.in;

    client_max_body_size 100M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /home/deploy/channel-manager/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/deploy/channel-manager/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /health/ {
        proxy_pass http://channel_manager;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /booking/widget/ {
        proxy_pass http://channel_manager;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Frame-Options;
    }

    location / {
        proxy_pass http://channel_manager;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/channel-manager-access.log;
    error_log /var/log/nginx/channel-manager-error.log;
}
