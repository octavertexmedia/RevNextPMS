# RevNext OpenBao — independent secrets stack (secrets.revnext.in)
# Lives at ~/revnext-secrets on Contabo. ChannelManager CI never touches this.
#
# Usage:
#   cd ~/revnext-secrets
#   docker compose -f docker-compose.yml up -d
#
# App containers reach OpenBao via host-published 127.0.0.1:8200
# (OPENBAO_ADDR=http://host.docker.internal:8200 or http://172.17.0.1:8200
#  or https://secrets.revnext.in from outside).

services:
  openbao:
    image: openbao/openbao:2.1.0
    container_name: revnext_secrets_openbao
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    command: server -config=/openbao/config/config.hcl
    volumes:
      - ./data:/openbao/file
      - ./config/config.hcl:/openbao/config/config.hcl:ro
      - ./scripts:/openbao/scripts:ro
    ports:
      - "127.0.0.1:8200:8200"
    healthcheck:
      test: ["CMD", "bao", "status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: revnext-secrets-network
