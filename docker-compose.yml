# Local development docker-compose file
# Run database, Redis, and OpenBao (dev) for local Django development
services:
  db:
    image: postgres:15-alpine
    container_name: channel_manager_db_local
    restart: unless-stopped
    environment:
      POSTGRES_DB: channel_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: channel_manager_redis_local
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data_local:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  openbao:
    image: openbao/openbao:latest
    container_name: channel_manager_openbao_local
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${OPENBAO_TOKEN:-dev-root-token}
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev -dev-root-token-id=${OPENBAO_TOKEN:-dev-root-token} -dev-listen-address=0.0.0.0:8200
    ports:
      - "127.0.0.1:8200:8200"
    healthcheck:
      test: ["CMD", "bao", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data_local:
    driver: local
  redis_data_local:
    driver: local
