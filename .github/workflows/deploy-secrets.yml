# Deploy RevNext OpenBao (secrets.revnext.in) — independent of ChannelManager product CI.
# Path-filtered + workflow_dispatch only. Never runs on routine app pushes.
#
# Required secrets (same Contabo VPS as ChannelManager):
#   VPS_SSH_PRIVATE_KEY, VPS_HOST, VPS_USER

name: Deploy RevNext Secrets (OpenBao)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'deploy/infra/**'
      - 'deploy/openbao/**'
      - 'nginx-secrets.conf'
      - 'nginx-secrets.http.conf'
      - '.github/workflows/deploy-secrets.yml'

env:
  DOCKER_BUILDKIT: 1

jobs:
  deploy-secrets:
    name: Deploy OpenBao on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deploy secrets
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          missing=""
          [ -z "$VPS_SSH_PRIVATE_KEY" ] && missing="VPS_SSH_PRIVATE_KEY "
          [ -z "$VPS_HOST" ] && missing="${missing}VPS_HOST "
          [ -z "$VPS_USER" ] && missing="${missing}VPS_USER "
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets: $missing"
            exit 1
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          VPS_HOST="$(echo -n "$VPS_HOST" | tr -d '\n\r\t ')"
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: SSH connectivity test
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          VPS_USER="$(echo -n "$VPS_USER" | tr -d '\n\r\t ')"
          VPS_HOST="$(echo -n "$VPS_HOST" | tr -d '\n\r\t ')"
          ssh -o BatchMode=yes -o ConnectTimeout=25 -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" "echo SSH_OK"

      - name: Copy secrets stack files to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          VPS_USER="$(echo -n "$VPS_USER" | tr -d '\n\r\t ')"
          VPS_HOST="$(echo -n "$VPS_HOST" | tr -d '\n\r\t ')"
          REMOTE="${VPS_USER}@${VPS_HOST}:/tmp/deploy-revnext-secrets"
          ssh -o StrictHostKeyChecking=accept-new "${VPS_USER}@${VPS_HOST}" \
            "mkdir -p /tmp/deploy-revnext-secrets"
          rsync -avz -e "ssh -o StrictHostKeyChecking=accept-new" \
            deploy/infra/docker-compose.secrets.yml \
            deploy/infra/config.hcl \
            deploy/infra/init.sh \
            deploy/infra/deploy-secrets.sh \
            nginx-secrets.conf \
            nginx-secrets.http.conf \
            "$REMOTE/"

      - name: Deploy secrets stack on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          VPS_USER="$(echo -n "$VPS_USER" | tr -d '\n\r\t ')"
          VPS_HOST="$(echo -n "$VPS_HOST" | tr -d '\n\r\t ')"
          ssh -o StrictHostKeyChecking=accept-new "${VPS_USER}@${VPS_HOST}" "set -e
            export IMAGE_DIR=/tmp/deploy-revnext-secrets
            chmod +x \$IMAGE_DIR/deploy-secrets.sh \$IMAGE_DIR/init.sh
            \$IMAGE_DIR/deploy-secrets.sh \$IMAGE_DIR
            rm -rf \$IMAGE_DIR
          "

      - name: Health check
        run: |
          sleep 10
          curl -fsS https://secrets.revnext.in/v1/sys/health || \
          curl -fsS http://secrets.revnext.in/v1/sys/health || \
          echo "Health check inconclusive — verify OpenBao on VPS :8200 and nginx site secrets"
