<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}RevNext Channel Manager — hotel channel management for the front desk{% endblock %}">
    <title>{% block title %}RevNext Channel Manager{% endblock %}</title>

    <link rel="icon" href="https://www.revnext.in/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="https://www.revnext.in/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://www.revnext.in/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

    {% load static %}
    <link rel="stylesheet" href="{% static 'landing/css/dawn-concierge.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body class="dawn-body dawn-auth-body">
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
