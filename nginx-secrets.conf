# Nginx for secrets.revnext.in → OpenBao (127.0.0.1:8200)
# Independent of ChannelManager product nginx site.
# Site name: /etc/nginx/sites-available/secrets

upstream revnext_openbao {
    server 127.0.0.1:8200;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name secrets.revnext.in;

    ssl_certificate /etc/letsencrypt/live/secrets.revnext.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/secrets.revnext.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 16M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # OpenBao UI is operator-only — restrict by IP or VPN in production if possible.
    # allow 10.0.0.0/8;
    # deny all;

    location / {
        proxy_pass http://revnext_openbao;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    access_log /var/log/nginx/secrets-access.log;
    error_log /var/log/nginx/secrets-error.log;
}

server {
    listen 80;
    server_name secrets.revnext.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
